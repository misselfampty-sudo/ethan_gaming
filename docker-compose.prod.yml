version: '3.8'

services:
  # Postgres database
  postgres:
    image: postgres:15-alpine
    container_name: arcade-postgres
    environment:
      POSTGRES_USER: arcade
      POSTGRES_PASSWORD: arcade_password
      POSTGRES_DB: arcade
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arcade_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U arcade']
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js API server
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: arcade-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_USER: arcade
      DB_HOST: postgres
      DB_NAME: arcade
      DB_PASSWORD: arcade_password
      DB_PORT: 5432
    ports:
      - "3000:3000"
    networks:
      - arcade_network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx web server
  nginx:
    image: nginx:alpine
    container_name: arcade-nginx
    depends_on:
      - api
    ports:
      - "8082:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./server/arcade-sync.js:/usr/share/nginx/html/arcade-sync.js:ro
    networks:
      - arcade_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  arcade_network:
    driver: bridge
