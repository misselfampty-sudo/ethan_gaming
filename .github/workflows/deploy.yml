name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, arcade]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy frontend
        run: cp index.html /home/arcade/app/index.html

      - name: Deploy backend (if needed)
        run: |
          cp -r server /home/arcade/app/
          cp docker-compose.prod.yml /home/arcade/app/
          cp nginx.prod.conf /home/arcade/app/

      - name: Start/update backend services
        run: |
          cd /home/arcade/app
          docker-compose -f docker-compose.prod.yml down || true
          docker-compose -f docker-compose.prod.yml up -d

      - name: Wait for API to be ready
        run: |
          sleep 5
          for i in {1..30}; do
            if curl -f http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✅ API is ready"
              exit 0
            fi
            echo "Waiting for API... (attempt $i/30)"
            sleep 1
          done
          echo "❌ API failed to start"
          exit 1

      - name: Reload Nginx
        run: sudo systemctl reload nginx